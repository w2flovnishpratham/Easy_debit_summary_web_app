<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Easy Debit Summary</title>
  <style>
    :root {
      --erp-bg: #f1f5f9;
      --erp-surface: #ffffff;
      --erp-accent: #1d4ed8;
      --erp-accent-hover: #1e40af;
      --erp-text: #1e293b;
      --erp-muted: #64748b;
      --erp-border: #e2e8f0;
      --erp-radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--erp-bg); color: var(--erp-text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--erp-surface); border: 1px solid var(--erp-border); border-radius: var(--erp-radius); padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--erp-accent); margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.85rem; color: var(--erp-muted); margin-bottom: 2rem; }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--erp-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: .04em; }
    input { width: 100%; padding: 0.65rem 0.85rem; border: 1px solid var(--erp-border); border-radius: 6px; font-size: 0.95rem; background: var(--erp-bg); color: var(--erp-text); margin-bottom: 1.1rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--erp-accent); }
    .btn { width: 100%; padding: 0.75rem; background: var(--erp-accent); color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn:hover { background: var(--erp-accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { margin-top: 1rem; font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 6px; display: none; }
    #msg.error { background: #fee2e2; color: #b91c1c; display: block; }
    #msg.success { background: #dcfce7; color: #15803d; display: block; }
    .footer-note { margin-top: 1.5rem; font-size: 0.78rem; color: var(--erp-muted); text-align: center; line-height: 1.5; }
    .footer-note a { color: var(--erp-accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Easy Debit Summary</div>
  <div class="subtitle">Desktop Edition</div>
  <h2>Activate Your License</h2>

  <form id="activate-form">
    <label for="email">Email address</label>
    <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">

    <label for="key">License key</label>
    <input id="key" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" required autocomplete="off" spellcheck="false">

    <button class="btn" type="submit" id="submit-btn">Activate</button>
  </form>

  <div id="msg"></div>

  <div class="footer-note">
    Need a license? <a href="https://easydebitsummary.com/downloads" target="_blank">Purchase at easydebitsummary.com</a><br>
    The desktop app works offline for parsing. License check requires internet once every 48 hours.
  </div>
</div>

<script>
document.getElementById('activate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Activating…';
  msg.className = '';
  msg.style.display = 'none';

  try {
    const resp = await fetch('/desktop/activate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        license_key: document.getElementById('key').value.trim()
      })
    });
    const data = await resp.json();
    if (data.ok) {
      msg.className = 'success';
      msg.textContent = data.message || 'Activated! Redirecting…';
      setTimeout(() => { window.location.href = '/'; }, 1500);
    } else {
      msg.className = 'error';
      msg.textContent = data.error || 'Activation failed. Check your key and try again.';
      btn.disabled = false;
      btn.textContent = 'Activate';
    }
  } catch (err) {
    msg.className = 'error';
    msg.textContent = 'Network error. Make sure you are connected to the internet.';
    btn.disabled = false;
    btn.textContent = 'Activate';
  }
});
</script>
</body>
</html>
